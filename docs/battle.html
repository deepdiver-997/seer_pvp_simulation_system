<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛尔号对战模拟器 - Web测试客户端</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #00d4ff;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .connection-panel {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .connection-panel h2 {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff4444;
        }

        .status-dot.connected {
            background: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff4444 0%, #cc0000 100%);
        }

        .battle-field {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .player-panel {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
        }

        .player-panel h3 {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .pet-info {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .pet-name {
            font-size: 1.2rem;
            color: #ffcc00;
            margin-bottom: 10px;
        }

        .hp-bar-container {
            background: #333;
            border-radius: 10px;
            height: 20px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .hp-bar {
            height: 100%;
            background: linear-gradient(90deg, #00ff88 0%, #00cc66 100%);
            transition: width 0.5s ease;
        }

        .hp-bar.low {
            background: linear-gradient(90deg, #ffcc00 0%, #ff9900 100%);
        }

        .hp-bar.critical {
            background: linear-gradient(90deg, #ff4444 0%, #cc0000 100%);
        }

        .hp-text {
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            font-size: 0.85rem;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 5px;
            border-radius: 4px;
            text-align: center;
        }

        .stat-label {
            color: #888;
            font-size: 0.75rem;
        }

        .stat-value {
            color: #00d4ff;
            font-weight: bold;
        }

        .skills-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .skill-btn {
            background: rgba(102, 126, 234, 0.3);
            border: 1px solid rgba(102, 126, 234, 0.5);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .skill-btn:hover:not(:disabled) {
            background: rgba(102, 126, 234, 0.5);
            transform: translateX(5px);
        }

        .skill-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .skill-pp {
            font-size: 0.8rem;
            color: #888;
        }

        .state-panel {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .state-panel h2 {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .state-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .state-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
        }

        .state-item .label {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        .state-item .value {
            color: #ffcc00;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .log-panel {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            padding: 20px;
            height: 300px;
            overflow-y: auto;
        }

        .log-panel h2 {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .log-entry {
            padding: 8px 12px;
            margin-bottom: 5px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.05);
        }

        .log-entry.receive {
            border-left: 3px solid #00d4ff;
        }

        .log-entry.send {
            border-left: 3px solid #00ff88;
        }

        .log-entry.error {
            border-left: 3px solid #ff4444;
            color: #ff4444;
        }

        .log-entry.system {
            border-left: 3px solid #ffcc00;
            color: #ffcc00;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .json-viewer {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 400px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 赛尔号对战模拟器</h1>

        <!-- Connection Panel -->
        <div class="connection-panel">
            <h2>📡 连接状态</h2>
            <div class="connection-status">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">未连接</span>
            </div>
            <div class="controls">
                <button class="btn btn-primary" id="connectBtn">连接服务器</button>
                <button class="btn btn-danger" id="disconnectBtn" disabled>断开连接</button>
                <button class="btn" id="initBattleBtn" disabled>初始化对战</button>
                <button class="btn" id="syncStateBtn" disabled>同步状态</button>
            </div>
        </div>

        <!-- Battle Field -->
        <div class="battle-field">
            <!-- Player 0 -->
            <div class="player-panel">
                <h3>👤 我方 (Player 0)</h3>
                <div class="pet-info" id="player0Pet">
                    <div class="pet-name">-</div>
                    <div class="hp-bar-container">
                        <div class="hp-bar" id="player0HpBar" style="width: 0%"></div>
                    </div>
                    <div class="hp-text" id="player0HpText">HP: -/-</div>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-label">攻击</div>
                            <div class="stat-value" id="player0Atk">-</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">特攻</div>
                            <div class="stat-value" id="player0SpAtk">-</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">速度</div>
                            <div class="stat-value" id="player0Spd">-</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">防御</div>
                            <div class="stat-value" id="player0Def">-</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">特防</div>
                            <div class="stat-value" id="player0SpDef">-</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">等级</div>
                            <div class="stat-value" id="player0Level">-</div>
                        </div>
                    </div>
                </div>
                <div class="skills-list" id="player0Skills">
                    <button class="skill-btn" disabled>选择精灵后可使用技能</button>
                </div>
            </div>

            <!-- Player 1 -->
            <div class="player-panel">
                <h3>👤 敌方 (Player 1)</h3>
                <div class="pet-info" id="player1Pet">
                    <div class="pet-name">-</div>
                    <div class="hp-bar-container">
                        <div class="hp-bar" id="player1HpBar" style="width: 0%"></div>
                    </div>
                    <div class="hp-text" id="player1HpText">HP: -/-</div>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-label">攻击</div>
                            <div class="stat-value" id="player1Atk">-</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">特攻</div>
                            <div class="stat-value" id="player1SpAtk">-</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">速度</div>
                            <div class="stat-value" id="player1Spd">-</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">防御</div>
                            <div class="stat-value" id="player1Def">-</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">特防</div>
                            <div class="stat-value" id="player1SpDef">-</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">等级</div>
                            <div class="stat-value" id="player1Level">-</div>
                        </div>
                    </div>
                </div>
                <div class="skills-list" id="player1Skills">
                    <button class="skill-btn" disabled>等待敌方信息</button>
                </div>
            </div>
        </div>

        <!-- State Panel -->
        <div class="state-panel">
            <h2>📊 对战状态</h2>
            <div class="state-info">
                <div class="state-item">
                    <div class="label">回合数</div>
                    <div class="value" id="stateRound">0</div>
                </div>
                <div class="state-item">
                    <div class="label">当前状态</div>
                    <div class="value" id="stateName">-</div>
                </div>
                <div class="state-item">
                    <div class="label">状态码</div>
                    <div class="value" id="stateCode">-</div>
                </div>
                <div class="state-item">
                    <div class="label">Battle UUID</div>
                    <div class="value" id="stateUuid">-</div>
                </div>
                <div class="state-item">
                    <div class="label">上次我方操作</div>
                    <div class="value" id="lastAction0">-</div>
                </div>
                <div class="state-item">
                    <div class="label">上次敌方操作</div>
                    <div class="value" id="lastAction1">-</div>
                </div>
            </div>
        </div>

        <!-- JSON Viewer -->
        <div class="state-panel">
            <h2>📋 JSON 状态详情</h2>
            <div class="json-viewer" id="jsonViewer">等待同步状态...</div>
        </div>

        <!-- Log Panel -->
        <div class="log-panel">
            <h2>📜 操作日志</h2>
            <div id="logContainer"></div>
        </div>
    </div>

    <script>
        // Protocol constants
        const Command = {
            INVALID: 0,
            SELECT_SKILL: 1,
            USE_MEDICINE: 2,
            CHOOSE_PET: 3,
            SEND_EMOJI: 4,
            INIT_BATTLE: 5,
            SYNC_STATE: 10,
            HEARTBEAT: 11,
        };

        // State names mapping
        const stateNames = {
            0: "游戏开始",
            5: "出战时/下场时",
            6: "选择技能/药剂",
            // ... (can add more as needed)
        };

        // Global state
        let ws = null;
        let battleUuid = Math.floor(Math.random() * 0xFFFFFFFF);
        let isConnected = false;

        // DOM elements
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const initBattleBtn = document.getElementById('initBattleBtn');
        const syncStateBtn = document.getElementById('syncStateBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const logContainer = document.getElementById('logContainer');
        const jsonViewer = document.getElementById('jsonViewer');

        // Helper: Format JSON with indentation
        function formatJson(json) {
            try {
                return JSON.stringify(JSON.parse(json), null, 2);
            } catch {
                return json;
            }
        }

        // Helper: Add log entry
        function addLog(message, type = 'system') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        // Helper: Build binary message
        function buildMessage(command, uuid, params = null) {
            const paramLen = params ? params.length : 0;
            const msgLen = 10 + paramLen;
            const buffer = new ArrayBuffer(msgLen);
            const view = new DataView(buffer);

            view.setUint32(0, msgLen, false);     // Big-Endian
            view.setUint16(4, command, false);     // Big-Endian
            view.setUint32(6, uuid, false);       // Big-Endian

            if (params) {
                new Uint8Array(buffer, 10).set(new Uint8Array(params));
            }

            return new Uint8Array(buffer);
        }

        // Helper: Build BattleCreateRequest (576 bytes)
        function buildBattleCreateRequest() {
            const buffer = new ArrayBuffer(576);
            const view = new DataView(buffer);
            let offset = 0;

            const monsterId = 12;  // 波克尔

            // 6 pets for each side
            for (let side = 0; side < 2; side++) {
                for (let i = 0; i < 6; i++) {
                    view.setInt32(offset, monsterId, false); offset += 4;       // pet_id
                    view.setInt32(offset, 10001, false); offset += 4;          // 撞击
                    view.setInt32(offset, 10008, false); offset += 4;          // 电光火石
                    view.setInt32(offset, 10009, false); offset += 4;          // 飞翼拍击
                    view.setInt32(offset, 10036, false); offset += 4;          // 同生共死
                    view.setInt32(offset, 10057, false); offset += 4;          // 手下留情
                    // 6 base stats
                    for (let j = 0; j < 5; j++) {
                        view.setInt32(offset, 0, false); offset += 4;
                    }
                    view.setInt32(offset, 85, false); offset += 4;             // hp
                }
            }

            return new Uint8Array(buffer);
        }

        // Helper: Build SelectSkill message
        function buildSelectSkillMessage(skillId) {
            const buffer = new ArrayBuffer(4);
            const view = new DataView(buffer);
            view.setInt32(0, skillId, false);
            return new Uint8Array(buffer);
        }

        // Update UI based on battle state
        function updateBattleState(state) {
            if (!state) return;

            document.getElementById('stateRound').textContent = state.round || 0;
            document.getElementById('stateName').textContent = state.stateName || '-';
            document.getElementById('stateCode').textContent = state.state || '-';
            document.getElementById('stateUuid').textContent = state.uuid || '-';

            // Last actions
            if (state.lastActions) {
                const action0 = state.lastActions.player0 || {};
                const action1 = state.lastActions.player1 || {};
                document.getElementById('lastAction0').textContent =
                    `Type: ${action0.type || '-'}, Index: ${action0.index || '-'}`;
                document.getElementById('lastAction1').textContent =
                    `Type: ${action1.type || '-'}, Index: ${action1.index || '-'}`;
            }

            // Update player 0 pet info
            if (state.player0) {
                const p0 = state.player0;
                if (p0.pet) {
                    document.querySelector('#player0Pet .pet-name').textContent = p0.pet.name || '-';
                    const hp = p0.pet.hp || 0;
                    const maxHp = p0.pet.maxHp || 1;
                    const hpPercent = Math.max(0, Math.min(100, (hp / maxHp) * 100));
                    const hpBar = document.getElementById('player0HpBar');
                    hpBar.style.width = hpPercent + '%';
                    hpBar.className = 'hp-bar' + (hpPercent < 20 ? ' critical' : hpPercent < 50 ? ' low' : '');
                    document.getElementById('player0HpText').textContent = `HP: ${hp}/${maxHp}`;

                    if (p0.pet.levels) {
                        document.getElementById('player0Atk').textContent = p0.pet.levels[0] || '-';
                        document.getElementById('player0SpAtk').textContent = p0.pet.levels[1] || '-';
                        document.getElementById('player0Def').textContent = p0.pet.levels[2] || '-';
                        document.getElementById('player0SpDef').textContent = p0.pet.levels[3] || '-';
                        document.getElementById('player0Spd').textContent = p0.pet.levels[4] || '-';
                        document.getElementById('player0Level').textContent = p0.pet.levels[5] || '-';
                    }

                    // Update skills
                    const skillsList = document.getElementById('player0Skills');
                    skillsList.innerHTML = '';
                    if (p0.pet.skills) {
                        p0.pet.skills.forEach((skill, idx) => {
                            const btn = document.createElement('button');
                            btn.className = 'skill-btn';
                            btn.innerHTML = `<span>${skill.name || '技能' + idx}</span><span class="skill-pp">PP: ${skill.pp}/${skill.maxPp}</span>`;
                            btn.onclick = () => selectSkill(skill.id);
                            skillsList.appendChild(btn);
                        });
                    }
                }
            }

            // Update player 1 pet info
            if (state.player1) {
                const p1 = state.player1;
                if (p1.pet) {
                    document.querySelector('#player1Pet .pet-name').textContent = p1.pet.name || '-';
                    const hp = p1.pet.hp || 0;
                    const maxHp = p1.pet.maxHp || 1;
                    const hpPercent = Math.max(0, Math.min(100, (hp / maxHp) * 100));
                    const hpBar = document.getElementById('player1HpBar');
                    hpBar.style.width = hpPercent + '%';
                    hpBar.className = 'hp-bar' + (hpPercent < 20 ? ' critical' : hpPercent < 50 ? ' low' : '');
                    document.getElementById('player1HpText').textContent = `HP: ${hp}/${maxHp}`;

                    if (p1.pet.levels) {
                        document.getElementById('player1Atk').textContent = p1.pet.levels[0] || '-';
                        document.getElementById('player1SpAtk').textContent = p1.pet.levels[1] || '-';
                        document.getElementById('player1Def').textContent = p1.pet.levels[2] || '-';
                        document.getElementById('player1SpDef').textContent = p1.pet.levels[3] || '-';
                        document.getElementById('player1Spd').textContent = p1.pet.levels[4] || '-';
                        document.getElementById('player1Level').textContent = p1.pet.levels[5] || '-';
                    }
                }
            }

            // Update JSON viewer
            jsonViewer.textContent = formatJson(JSON.stringify(state));
        }

        // Select skill
        function selectSkill(skillId) {
            if (!isConnected) {
                addLog('未连接服务器', 'error');
                return;
            }
            const msg = buildMessage(Command.SELECT_SKILL, battleUuid, buildSelectSkillMessage(skillId));
            ws.send(msg);
            addLog(`选择技能: ${skillId}`, 'send');
        }

        // Sync state
        function syncState() {
            if (!isConnected) {
                addLog('未连接服务器', 'error');
                return;
            }
            const msg = buildMessage(Command.SYNC_STATE, battleUuid);
            ws.send(msg);
            addLog('请求同步状态', 'send');
        }

        // Connect to WebSocket bridge
        function connect() {
            const wsUrl = 'ws://localhost:8080';
            addLog(`正在连接 ${wsUrl}...`, 'system');

            ws = new WebSocket(wsUrl);

            ws.binaryType = 'arraybuffer';

            ws.onopen = () => {
                isConnected = true;
                statusDot.classList.add('connected');
                statusText.textContent = '已连接';
                connectBtn.disabled = true;
                disconnectBtn.disabled = false;
                initBattleBtn.disabled = false;
                syncStateBtn.disabled = false;
                addLog('连接成功', 'system');
            };

            ws.onclose = () => {
                isConnected = false;
                statusDot.classList.remove('connected');
                statusText.textContent = '已断开';
                connectBtn.disabled = false;
                disconnectBtn.disabled = true;
                initBattleBtn.disabled = true;
                syncStateBtn.disabled = true;
                addLog('连接已断开', 'system');
            };

            ws.onerror = (err) => {
                addLog(`连接错误: ${err.message || '未知错误'}`, 'error');
            };

            ws.onmessage = (event) => {
                try {
                    const buffer = new Uint8Array(event.data);
                    if (buffer.length < 10) {
                        addLog(`收到过短消息: ${buffer.length} bytes`, 'error');
                        return;
                    }

                    const view = new DataView(buffer.buffer, buffer.byteOffset, buffer.byteLength);
                    const totalLen = view.getUint32(0, false);
                    const command = view.getUint16(4, false);
                    const uuid = view.getUint32(6, false);

                    const cmdName = Object.keys(Command).find(k => Command[k] === command) || `UNKNOWN(${command})`;
                    addLog(`收到: cmd=${cmdName}, uuid=${uuid}, len=${totalLen}`, 'receive');

                    // Handle SYNC_STATE response
                    if (command === Command.SYNC_STATE && totalLen > 10) {
                        const body = new TextDecoder('utf-8').decode(buffer.slice(10, totalLen));
                        try {
                            const state = JSON.parse(body);
                            updateBattleState(state);
                        } catch {
                            addLog(`JSON解析失败: ${body.substring(0, 100)}`, 'error');
                        }
                    }
                } catch (err) {
                    addLog(`消息处理错误: ${err.message}`, 'error');
                }
            };
        }

        // Disconnect
        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
            }
        }

        // Initialize battle
        function initBattle() {
            if (!isConnected) {
                addLog('未连接服务器', 'error');
                return;
            }
            battleUuid = Math.floor(Math.random() * 0xFFFFFFFF);
            const msg = buildMessage(Command.INIT_BATTLE, battleUuid, buildBattleCreateRequest());
            ws.send(msg);
            addLog(`初始化对战, UUID: ${battleUuid}`, 'send');

            // Auto sync after init
            setTimeout(syncState, 1000);
        }

        // Event listeners
        connectBtn.onclick = connect;
        disconnectBtn.onclick = disconnect;
        initBattleBtn.onclick = initBattle;
        syncStateBtn.onclick = syncState;

        // Initial log
        addLog('Web测试客户端已加载', 'system');
        addLog('点击"连接服务器"开始测试', 'system');
    </script>
