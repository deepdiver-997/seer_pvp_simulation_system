<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle Debug Console</title>
<style>
:root {
  --bg: #1a1a2e;
  --panel: #16213e;
  --accent: #0f3460;
  --highlight: #e94560;
  --text: #eee;
  --text2: #aaa;
  --hp-green: #4caf50;
  --hp-yellow: #ffc107;
  --hp-red: #f44336;
  --skill-bg: #1a1a3e;
  --border: #333;
  --btn-bg: #0f3460;
  --btn-hover: #1a508b;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', 'PingFang SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
}
#toolbar {
  background: var(--panel);
  padding: 8px 16px;
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
  min-height: 48px;
}
#toolbar button {
  background: var(--btn-bg);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 6px 14px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  white-space: nowrap;
}
#toolbar button:hover { background: var(--btn-hover); }
#toolbar button.active { background: var(--highlight); }
#toolbar select, #toolbar input {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 13px;
}
#toolbar input[type="number"] { width: 60px; }
#status { padding: 6px 12px; font-size: 12px; color: var(--text2); }
#status.connected { color: #4caf50; }
#status.disconnected { color: #f44336; }
#main {
  flex: 1;
  display: flex;
  overflow: hidden;
}
#left-panel {
  width: 420px;
  min-width: 360px;
  background: var(--panel);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 8px;
}
#right-panel {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.player-section {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px;
  margin-bottom: 10px;
}
.player-title {
  font-weight: bold;
  font-size: 14px;
  margin-bottom: 6px;
  padding: 4px 8px;
  border-radius: 3px;
}
.pl0 { color: #4fc3f7; background: rgba(79,195,247,0.1); }
.pl1 { color: #ef5350; background: rgba(239,83,80,0.1); }
.pet-card {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  margin: 3px 0;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  border: 1px solid transparent;
}
.pet-card:hover { border-color: var(--border); background: rgba(255,255,255,0.03); }
.pet-card.on-stage { border-color: var(--highlight); background: rgba(233,68,96,0.08); }
.pet-card.dead { opacity: 0.5; }
.pet-icon { width: 32px; height: 32px; border-radius: 4px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.pet-info { flex: 1; min-width: 0; }
.pet-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pet-stats { color: var(--text2); font-size: 11px; }
.hp-bar-bg { height: 6px; background: #333; border-radius: 3px; margin-top: 2px; overflow: hidden; }
.hp-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
.hp-bar-fill.green { background: var(--hp-green); }
.hp-bar-fill.yellow { background: var(--hp-yellow); }
.hp-bar-fill.red { background: var(--hp-red); }
.state-badge {
  display: inline-block;
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 11px;
  margin: 1px;
}
.state-badge.effect { background: rgba(79,195,247,0.2); color: #4fc3f7; }
.state-badge.abnormal { background: rgba(239,83,80,0.2); color: #ef5350; }
.state-badge.pending { background: rgba(255,193,7,0.2); color: #ffc107; }
#state-info {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px;
  margin-bottom: 10px;
}
#state-info .current { font-size: 16px; font-weight: bold; }
#state-info .detail { font-size: 11px; color: var(--text2); margin-top: 4px; }
.section-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  margin: 10px 0 6px;
  padding-bottom: 3px;
  border-bottom: 1px solid var(--border);
}
.effect-row {
  padding: 3px 8px;
  font-size: 11px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  font-family: 'Courier New', monospace;
}
.effect-row .eid { color: #4fc3f7; }
.effect-row .estate { color: #ffc107; }
.effect-row .eexpired { color: #f44336; }
.effect-row .eactive { color: #4caf50; }
.json-view {
  background: #0d1117;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 8px;
  font-size: 11px;
  font-family: 'Courier New', monospace;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 400px;
  overflow-y: auto;
  color: #8b949e;
}
#event-log {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 120px;
  background: #0d1117;
  border-top: 1px solid var(--border);
  overflow-y: auto;
  font-size: 11px;
  font-family: 'Courier New', monospace;
  padding: 6px 12px;
  color: var(--text2);
}
#event-log .log-line { padding: 1px 0; }
#event-log .log-send { color: #4fc3f7; }
#event-log .log-recv { color: #4caf50; }
#event-log .log-error { color: #f44336; }
.breakpoint-chips { display: flex; flex-wrap: wrap; gap: 4px; margin: 4px 0; }
.breakpoint-chip {
  background: var(--highlight);
  color: #fff;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
}
.breakpoint-chip:hover { opacity: 0.8; }
.breakpoint-chip .rm { font-weight: bold; margin-left: 2px; }
</style>
</head>
<body>
<div id="toolbar">
  <span id="status" class="disconnected">&#9679; 未连接</span>
  <button onclick="connectWS()" id="btn-connect">连接</button>
  <button onclick="doInit()" id="btn-init">初始化对战</button>
  <span style="color:var(--text2)">|</span>
  <button onclick="doStep()" id="btn-step" disabled>单步执行</button>
  <button onclick="doContinue()" id="btn-continue" disabled>继续运行</button>
  <span style="color:var(--text2)">|</span>
  <input type="number" id="bp-state" placeholder="状态ID" title="断点状态ID">
  <button onclick="doBreakpoint()" id="btn-bp" disabled>断点切换</button>
  <button onclick="doFullState()" id="btn-full" disabled>刷新完整状态</button>
  <span style="color:var(--text2)">|</span>
  <label style="font-size:12px;color:var(--text2)">
    UUID: <input type="number" id="uuid-input" value="1" style="width:100px">
  </label>
  <label style="font-size:12px;color:var(--text2)">
    回合动作:
    P0 <select id="act-p0"><option value="1">技能</option><option value="2">药剂</option><option value="0">切换</option></select>
    id <input type="number" id="idx-p0" value="0" style="width:50px">
    P1 <select id="act-p1"><option value="1">技能</option><option value="2">药剂</option><option value="0">切换</option></select>
    id <input type="number" id="idx-p1" value="0" style="width:50px">
  </label>
  <button onclick="doStepSubmit()">提交并单步</button>
</div>
<div id="main">
  <div id="left-panel">
    <div id="state-info"><span class="current">等待连接...</span></div>
    <div id="breakpoints-area"></div>
    <div class="section-title">&#9876; Player 0 <span style="color:#4fc3f7">(蓝方)</span></div>
    <div id="player0-pets"></div>
    <div class="section-title">&#9876; Player 1 <span style="color:#ef5350">(红方)</span></div>
    <div id="player1-pets"></div>
  </div>
  <div id="right-panel">
    <div class="section-title">效果表 / Effects</div>
    <div id="effects-view"></div>
    <div class="section-title">工作区 / Workspace</div>
    <div id="workspace-view"></div>
    <div class="section-title">异常状态 / Abnormal Status</div>
    <div id="abnormal-view"></div>
  </div>
</div>
<div id="event-log"></div>

<script>
// ---- Protocol Constants ----
const CMD = { SELECT_SKILL:1, USE_MEDICINE:2, CHOOSE_PET:3, INIT_BATTLE:5, SYNC_STATE:10, HEARTBEAT:11, DEBUG_STEP:20, DEBUG_CONTINUE:21, DEBUG_BREAKPOINT:22, DEBUG_FULLSTATE:23 };
const WS_URL = 'ws://localhost:8080';
let ws = null;
let fullState = null;
let breakpoints = new Set();

// ---- Helpers ----
function $(id) { return document.getElementById(id); }
function log(level, msg) {
  const el = $('event-log');
  const cls = level === 'SEND' ? 'log-send' : level === 'ERROR' ? 'log-error' : 'log-recv';
  el.innerHTML += `<div class="log-line ${cls}">[${new Date().toLocaleTimeString()}] [${level}] ${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

function buildPacket(cmd, uuid, body = new Uint8Array(0)) {
  const totalLen = 10 + body.length;
  const buf = new ArrayBuffer(totalLen);
  const dv = new DataView(buf);
  dv.setUint32(0, totalLen, false);
  dv.setUint16(4, cmd, false);
  dv.setUint32(6, uuid, false);
  if (body.length) new Uint8Array(buf, 10).set(body);
  return buf;
}

function buildActionBody(robotId, actionType, index) {
  const buf = new ArrayBuffer(16);
  const dv = new DataView(buf);
  dv.setInt32(0, robotId, false);
  dv.setInt32(4, actionType, false);
  dv.setInt32(8, index, false);
  dv.setInt32(12, 0, false);
  return new Uint8Array(buf);
}

function buildInit012Body() {
  const perSide = 6 * 12 * 4; // 6 pets * 12 ints * 4 bytes
  const buf = new ArrayBuffer(perSide * 2);
  const dv = new DataView(buf);
  const atkSkills = [10038, 10057, 10001, 10008, 10009];
  const defSkills = [10001, 10008, 10009, 10033, 20017];
  let off = 0;
  function writePet(skills) {
    dv.setInt32(off, 12, false); off += 4; // pet_id=12 (波克尔)
    skills.forEach(s => { dv.setInt32(off, s, false); off += 4; });
    for (let i = 0; i < 6; i++) { dv.setInt32(off, 0, false); off += 4; } // base stats
  }
  for (let i = 0; i < 6; i++) writePet(atkSkills);
  for (let i = 0; i < 6; i++) writePet(defSkills);
  return new Uint8Array(buf);
}

function uuid() { return parseInt($('uuid-input').value) || 1; }

function sendPacket(pkt) {
  if (!ws || ws.readyState !== WebSocket.OPEN) { log('ERROR', '未连接'); return; }
  ws.send(pkt);
  log('SEND', `cmd=${new DataView(pkt).getUint16(4,false)} uuid=${new DataView(pkt).getUint32(6,false)}`);
}

function sendCommand(cmd, uid, body) { sendPacket(buildPacket(cmd, uid || uuid(), body)); }

// ---- Connection ----
function connectWS() {
  if (ws) { ws.close(); }
  ws = new WebSocket(WS_URL);
  ws.binaryType = 'arraybuffer';
  ws.onopen = () => {
    $('status').textContent = '\u25cf 已连接';
    $('status').className = 'connected';
    $('btn-connect').textContent = '断开';
    ['btn-step','btn-continue','btn-bp','btn-full','btn-init'].forEach(id => $(id).disabled = false);
    log('SEND', '已连接到 ' + WS_URL);
  };
  ws.onclose = () => {
    $('status').textContent = '\u25cf 未连接';
    $('status').className = 'disconnected';
    $('btn-connect').textContent = '连接';
    ['btn-step','btn-continue','btn-bp','btn-full','btn-init'].forEach(id => $(id).disabled = true);
    setTimeout(() => { if (!ws || ws.readyState > 1) $('#status').textContent = '\u25cf 连接断开，请重连'; }, 500);
  };
  ws.onmessage = (evt) => {
    if (!(evt.data instanceof ArrayBuffer)) return;
    const data = new Uint8Array(evt.data);
    if (data.length < 10) return;
    const dv = new DataView(data.buffer);
    const totalLen = dv.getUint32(0, false);
    const cmd = dv.getUint16(4, false);
    const uid = dv.getUint32(6, false);
    let payload = '';
    if (data.length > 10) {
      payload = new TextDecoder().decode(data.slice(10));
    }
    log('RECV', `cmd=${cmd} uuid=${uid} len=${data.length}`);

    if (cmd === CMD.SYNC_STATE) {
      try {
        const st = JSON.parse(payload);
        if (st.error) { log('ERROR', 'sync error: ' + st.error); return; }
        renderSyncState(st);
      } catch(e) { log('ERROR', 'parse sync: ' + e); }
    } else if (cmd === CMD.DEBUG_FULLSTATE) {
      try {
        fullState = JSON.parse(payload);
        renderFullState(fullState);
      } catch(e) { log('ERROR', 'parse fullstate: ' + e); }
    }
  };
}

// ---- Actions ----
function doInit() {
  sendCommand(CMD.INIT_BATTLE, uuid(), buildInit012Body());
  setTimeout(() => sendCommand(CMD.SYNC_STATE, uuid()), 300);
}

function doStep() {
  sendCommand(CMD.DEBUG_STEP, uuid());
}

function doContinue() {
  sendCommand(CMD.DEBUG_CONTINUE, uuid());
}

function doBreakpoint() {
  const stateVal = parseInt($('bp-state').value);
  if (isNaN(stateVal)) { log('ERROR', '请输入有效状态ID'); return; }
  sendCommand(CMD.DEBUG_BREAKPOINT, uuid(), buildIntBody([stateVal]));
  // toggle locally
  if (breakpoints.has(stateVal)) breakpoints.delete(stateVal);
  else breakpoints.add(stateVal);
  renderBreakpoints();
}

function doFullState() {
  sendCommand(CMD.DEBUG_FULLSTATE, uuid());
}

function doStepSubmit() {
  const uid = uuid();
  const a0 = parseInt($('act-p0').value);
  const i0 = parseInt($('idx-p0').value);
  const a1 = parseInt($('act-p1').value);
  const i1 = parseInt($('idx-p1').value);

  const cmds = {1: CMD.SELECT_SKILL, 2: CMD.USE_MEDICINE, 0: CMD.CHOOSE_PET};
  sendPacket(buildPacket(cmds[a0], uid, buildActionBody(0, a0, i0)));
  sendPacket(buildPacket(cmds[a1], uid, buildActionBody(1, a1, i1)));
  setTimeout(() => sendCommand(CMD.DEBUG_STEP, uid), 100);
}

function buildIntBody(vals) {
  const buf = new ArrayBuffer(vals.length * 4);
  const dv = new DataView(buf);
  vals.forEach((v, i) => dv.setInt32(i * 4, v, false));
  return new Uint8Array(buf);
}

// ---- Rendering ----
function hpClass(pct) {
  if (pct > 0.5) return 'green';
  if (pct > 0.2) return 'yellow';
  return 'red';
}

function renderSyncState(st) {
  $('state-info').innerHTML = `
    <div class="current">${st.stateName} (${st.state})</div>
    <div class="detail">回合 ${st.round} | 需要输入: ${st.needInput} | 输入方: P${st.inputPlayer}</div>`;
  renderParty(st.player0, 0);
  renderParty(st.player1, 1);
}

function renderParty(pl, idx) {
  const container = $(`player${idx}-pets`);
  if (!pl || !pl.party) return;
  container.innerHTML = pl.party.map(p => {
    const isOnStage = p.onStage;
    const isDead = !p.alive;
    const hpPct = p.maxHp > 0 ? p.hp / p.maxHp : 0;
    return `<div class="pet-card ${isOnStage ? 'on-stage' : ''} ${isDead ? 'dead' : ''}">
      <div class="pet-icon">${isDead ? '💀' : isOnStage ? '⚔️' : '🐾'}</div>
      <div class="pet-info">
        <div class="pet-name">${p.name} <span style="color:var(--text2)">#${p.id}</span></div>
        <div class="pet-stats">HP ${p.hp}/${p.maxHp} | 槽位 ${p.slot}</div>
        <div class="hp-bar-bg"><div class="hp-bar-fill ${hpClass(hpPct)}" style="width:${Math.round(hpPct*100)}%"></div></div>
      </div>
    </div>`;
  }).join('');
}

function renderBreakpoints() {
  const area = $('breakpoints-area');
  if (breakpoints.size === 0) { area.innerHTML = ''; return; }
  area.innerHTML = `<div class="section-title">🔴 断点</div><div class="breakpoint-chips">` +
    [...breakpoints].map(bp =>
      `<span class="breakpoint-chip" onclick="breakpoints.delete(${bp}); renderBreakpoints(); sendCommand(CMD.DEBUG_BREAKPOINT, uuid(), buildIntBody([${bp}]));">状态 ${bp}<span class="rm">×</span></span>`
    ).join('') + `</div>`;
}

function renderFullState(fs) {
  if (!fs) return;

  // Update state info
  $('state-info').innerHTML = `
    <div class="current">${fs.stateName} (${fs.state})</div>
    <div class="detail">
      回合 ${fs.round} | 需要输入: ${fs.needInput} | 输入方: P${fs.inputPlayer}
      <br>单步模式: ${fs.debug?.stepMode || false} | 断点: [${(fs.debug?.breakpoints || []).join(', ')}]
    </div>`;

  // Update breakpoints from server
  breakpoints = new Set(fs.debug?.breakpoints || []);
  renderBreakpoints();

  // Render parties
  renderFullParty(fs.player0, 0);
  renderFullParty(fs.player1, 1);

  // Render effects
  renderEffects(fs);

  // Render workspace
  renderWorkspace(fs);

  // Render abnormal status
  renderAbnormal(fs);
}

function renderFullParty(pl, idx) {
  if (!pl) return;
  const container = $(`player${idx}-pets`);
  const colors = ['#4fc3f7', '#ef5350'];
  container.innerHTML = `<div class="player-title pl${idx}">Player ${idx} (${pl.aliveCount} 存活) 场上: 槽${pl.onStage} | 药剂: [${(pl.medicines||[]).join(',')}]</div>` +
    (pl.party || []).map(p => {
      const isOnStage = p.onStage;
      const isDead = !p.alive;
      const hpPct = p.maxHp > 0 ? p.hp / p.maxHp : 0;
      const stats = p.stats ? `${p.stats.attack}/${p.stats.defense}/${p.stats.specialAttack}/${p.stats.specialDefense}/${p.stats.speed}` : '';
      let marks = '';
      if (p.marks && p.marks.length) marks = ` 印记: [${p.marks.map(m=>m.name+':'+m.count).join(',')}]`;
      return `<div class="pet-card ${isOnStage ? 'on-stage' : ''} ${isDead ? 'dead' : ''}">
        <div class="pet-icon">${isDead ? '💀' : isOnStage ? '⚔️' : '🐾'}</div>
        <div class="pet-info">
          <div class="pet-name">${p.name} #${p.id} ${isOnStage ? '⭐' : ''} ${p.isLocked ? '🔒' : ''}</div>
          <div class="pet-stats">
            HP ${p.hp}/${p.maxHp} 盾:${p.shield||0} 挡:${p.cover||0}
            ${stats ? ' | 属性: ' + stats : ''}
            ${marks}
            ${p.soulMark && p.soulMark.name ? ' | 魂印: ' + p.soulMark.name : ''}
          </div>
          <div class="hp-bar-bg"><div class="hp-bar-fill ${hpClass(hpPct)}" style="width:${Math.round(hpPct*100)}%"></div></div>
          ${p.levels ? `<div style="font-size:10px;color:var(--text2);margin-top:2px">等级: ATK${p.levels[0]} SPA${p.levels[1]} DEF${p.levels[2]} SPD${p.levels[3]} SPE${p.levels[4]} HIT${p.levels[5]}</div>` : ''}
          ${p.skills ? `<div style="font-size:10px;color:var(--text2)">技能: ${p.skills.map(s=>`${s.name}(${s.pp}/${s.maxPp})`).join(' | ')}</div>` : ''}
        </div>
      </div>`;
    }).join('');

  // Render abnormal status end rounds
  if (pl.abnormalStatusEndRounds) {
    const entries = Object.entries(pl.abnormalStatusEndRounds);
    if (entries.length) {
      const names = {0:'麻痹',1:'中毒',2:'烧伤',3:'寄生对手',4:'寄生',5:'冻伤',6:'害怕',7:'疲惫',8:'睡眠',9:'石化',10:'混乱',11:'衰弱',12:'山神守护',13:'易燃',14:'狂暴',15:'冰封',16:'流血',17:'免疫',18:'免疫II',19:'瘫痪',20:'失明',21:'异常免疫',22:'焚烬',23:'诅咒',24:'烈焰诅咒',25:'致命诅咒',26:'虚弱诅咒',27:'感染',28:'束缚',29:'失神',30:'沉默',31:'臣服',32:'凝滞',33:'星赐',34:'星哲',35:'超频'};
      container.innerHTML += `
        <div style="margin-top:4px;font-size:10px;color:var(--text2)">
          异常状态 (round < endRound): ${entries.map(([k,v])=>`<span class="state-badge abnormal">${names[k]||k}→${v}</span>`).join(' ')}
        </div>`;
    }
  }
}

function renderEffects(fs) {
  const area = $('effects-view');
  if (!fs) { area.innerHTML = '<span style="color:var(--text2)">点击"刷新完整状态"加载</span>'; return; }

  let html = '';

  // Skill effects
  html += '<div class="section-title">技能效果 (skillEffects)</div>';
  html += renderEffectTable(fs.skillEffects, 'effect');

  // Soul mark effects
  html += '<div class="section-title">魂印效果 (soulMarkEffects)</div>';
  html += renderEffectTable(fs.soulMarkEffects, 'effect');

  // Pending effects
  html += '<div class="section-title">待注册/未来触发器 (pendingEffects)</div>';
  html += renderEffectTable(fs.pendingEffects, 'pending');

  // Passive effects
  if (fs.passiveEffects) {
    html += '<div class="section-title">被动效果 (passiveEffects)</div>';
    for (const [key, peffs] of Object.entries(fs.passiveEffects)) {
      html += `<div style="font-size:11px">${key}: `;
      html += (peffs || []).map(e => `<span class="state-badge effect">ID:${e.effectId} 过期:${e.isExpired}</span>`).join(' ');
      html += `</div>`;
    }
  }

  area.innerHTML = html || '<span style="color:var(--text2)">无效果</span>';
}

function renderEffectTable(bucket, type) {
  if (!bucket || Object.keys(bucket).length === 0) return '<div style="font-size:11px;color:var(--text2)">无</div>';
  let html = '';
  for (const [key, entry] of Object.entries(bucket)) {
    const cls = type === 'pending' ? 'pending' : 'effect';
    html += `<div class="effect-row">
      <span class="state-badge ${cls}">${entry.stateName}(${entry.state})</span>
      P${entry.player}:
      <span style="color:#4fc3f7">${entry.count}条</span>`;
    if (entry.effects) {
      html += ' ' + entry.effects.map(e =>
        `<span class="${e.isExpired ? 'eexpired' : 'eactive'}">[EID:${e.effectId} O:${e.owner} ${e.isRoundEffect ? 'R' : ''} ${e.isExpired ? 'EXP' : 'ACT'}]</span>`
      ).join(' ');
    }
    html += `</div>`;
  }
  return html;
}

function renderWorkspace(fs) {
  const area = $('workspace-view');
  if (!fs || !fs.workspace) { area.innerHTML = '<span style="color:var(--text2)">点击"刷新完整状态"加载</span>'; return; }
  const ws = fs.workspace;
  area.innerHTML = `
    <div style="font-size:11px">
      <div>先手权: <b>${ws.preemptiveRight}</b> | 先制等级: [${ws.preemptiveLevel}]</div>
      <div>回合选择: P0(${ws.roundChoice?.[0]?.type},${ws.roundChoice?.[0]?.index}) P1(${ws.roundChoice?.[1]?.type},${ws.roundChoice?.[1]?.index})</div>
      <div>上次动作: P0(${ws.lastActions?.[0]?.type},${ws.lastActions?.[0]?.index}) P1(${ws.lastActions?.[1]?.type},${ws.lastActions?.[1]?.index})</div>
      <div>伤害: 待结算(attacker:${ws.damage?.pending?.attacker} final:${ws.damage?.pending?.final})
        已结算(attacker:${ws.damage?.resolved?.attacker} final:${ws.damage?.resolved?.final})</div>
      <div>减伤: P0 add=[${ws.damageReduce?.player0Add}] mul=[${ws.damageReduce?.player0Mul}]
        P1 add=[${ws.damageReduce?.player1Add}] mul=[${ws.damageReduce?.player1Mul}]</div>
      <div>技能结算: P0 ready=${ws.skillResolution?.player0Ready} used=${ws.skillResolution?.player0Used} attacked=${ws.skillResolution?.player0Attacked}
        P1 ready=${ws.skillResolution?.player1Ready} used=${ws.skillResolution?.player1Used} attacked=${ws.skillResolution?.player1Attacked}</div>
      <div>战斗属性: P0 [${ws.battleAttrs?.player0}] | P1 [${ws.battleAttrs?.player1}]</div>
      <div>视角等级: P0 [${ws.viewLevels?.player0}] | P1 [${ws.viewLevels?.player1}]</div>
    </div>`;
}

function renderAbnormal(fs) {
  const area = $('abnormal-view');
  if (!fs) { area.innerHTML = '<span style="color:var(--text2)">点击"刷新完整状态"加载</span>'; return; }
  let html = '';
  const names = {0:'麻痹',1:'中毒',2:'烧伤',3:'寄生对手',4:'寄生',5:'冻伤',6:'害怕',7:'疲惫',8:'睡眠',9:'石化',10:'混乱',11:'衰弱',12:'山神守护',13:'易燃',14:'狂暴',15:'冰封',16:'流血',17:'免疫',18:'免疫II',19:'瘫痪',20:'失明',21:'异常免疫',22:'焚烬',23:'诅咒',24:'烈焰诅咒',25:'致命诅咒',26:'虚弱诅咒',27:'感染',28:'束缚',29:'失神',30:'沉默',31:'臣服',32:'凝滞',33:'星赐',34:'星哲',35:'超频'};
  for (const [pkey, pdata] of [['player0', fs.player0], ['player1', fs.player1]]) {
    if (pdata && pdata.abnormalStatusEndRounds) {
      const entries = Object.entries(pdata.abnormalStatusEndRounds);
      html += `<div style="font-size:11px;margin-bottom:4px"><b>${pkey}:</b> `;
      html += entries.map(([k, v]) => `<span class="state-badge abnormal">${names[k]||k} 持续到回合${v}</span>`).join(' ');
      html += entries.length === 0 ? ' 无' : '';
      html += '</div>';
    }
  }
  // Also show the operation_collected and buffer info
  if (fs.operationCollected) {
    html += `<div style="font-size:11px;color:var(--text2);margin-top:4px">
      已收集操作: P0=${fs.operationCollected.player0} P1=${fs.operationCollected.player1}
      | 缓冲区空: ${fs.bufferInfo?.isEmpty} (${fs.bufferInfo?.bufferSize||0}字节)
    </div>`;
  }
  area.innerHTML = html || '<span style="color:var(--text2)">无异常状态</span>';
}

// ---- Init ----
window.addEventListener('load', () => {
  connectWS();
});
</script>
</body>
</html>
